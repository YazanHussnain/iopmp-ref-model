# GitLab CI/CD for the RISC-V IOPMP reference model.
# Builds the model + tests, then runs the full CTest suite (all 18 feature
# suites) with a JUnit report surfaced in the GitLab MR/pipeline UI.

stages:
  - build
  - test

default:
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq build-essential cmake
    - cmake --version

# ── Build the project (warning-clean under -Werror) ──────────────────
build:
  stage: build
  script:
    - cmake -S . -B build
    - cmake --build build --parallel
  artifacts:
    paths:
      - build/
    expire_in: 1 hour

# ── Run every test via CTest ─────────────────────────────────────────
test:
  stage: test
  needs: ["build"]
  script:
    - cd build
    - ctest --output-on-failure --output-junit ctest-report.xml
  artifacts:
    when: always
    paths:
      - build/ctest-report.xml
    reports:
      junit: build/ctest-report.xml
    expire_in: 1 week

# ── Code coverage (instrumented build + gcovr) ───────────────────────
# Coverage uses its own instrumented build (the `build` artifact is not).
# The job's `coverage` regex captures the overall line rate for the GitLab
# UI; the Cobertura report annotates changed lines in merge requests.
coverage:
  stage: test
  needs: []
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq build-essential cmake gcovr
  script:
    - cmake -S . -B cov-build -DIOPMP_COVERAGE=ON
    - cmake --build cov-build --parallel
    - (cd cov-build && ctest --output-on-failure)
    - mkdir -p coverage
    - >
      gcovr --root . --filter 'libiopmp/' --filter 'libsystem/'
      --print-summary
      --xml-pretty -o coverage/cobertura.xml
      --html-details coverage/index.html
  coverage: '/^lines:\s*\d+\.\d+\%/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: 1 week
